<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HostelOps Complaint System</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
body{
display:none;
}
</style>

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="dashboard-header">

<div class="logo-area">
<span class="logo-icon">📋</span>
<h1>HostelOps Complaint System</h1>
</div>

<div class="nav-right">

<span id="userRole" class="panel-label"></span>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

</header>


<!-- ================= MAIN CONTENT ================= -->

<main class="dashboard-container">


<!-- ================= COMPLAINT FORM ================= -->

<section class="submit-section">

<div class="card">

<h2 class="section-title">
➕ Submit a Complaint
</h2>

<form id="complaintForm" class="complaint-form">

<input
type="text"
id="name"
placeholder="Your Name"
required
/>

<input
type="text"
id="enrollment"
placeholder="Enrollment Number"
required
/>

<div class="row-fields">

<select id="course">
<option value="">Course</option>
<option>BCA</option>
<option>BTech</option>
<option>MCA</option>
</select>

<select id="branch">
<option value="">Branch</option>
<option>Computer Science</option>
<option>Information Science</option>
<option>AIML</option>
<option>Electronics and Communication</option>
<option>Robotics</option>
<option>Mechanical</option>
</select>

<select id="semester">
<option value="">Semester</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>

</div>

<select id="category">
<option value="Electrical">Electrical</option>
<option value="Plumbing">Plumbing</option>
<option value="Furniture">Furniture</option>
<option value="Cleanliness">Cleanliness</option>
</select>

<textarea
id="description"
placeholder="Describe the issue in detail..."
required
></textarea>

<label class="form-label">Complaint Urgency</label>

<select id="priority">
<option value="Low">Low (Not Urgent)</option>
<option value="Medium">Medium Priority</option>
<option value="High">High Priority</option>
</select>

<button type="submit" class="submit-btn">
✈ Submit Complaint
</button>

</form>

</div>

</section>



<!-- ================= COMPLAINT LIST ================= -->

<section class="complaints-section">

<h2 class="section-title">
📋 Your Complaints
</h2>

<div id="complaintList" class="complaints-grid"></div>

</section>


</main>


<!-- ================= USER ROLE SCRIPT ================= -->

<script>

const role = localStorage.getItem("role");

if(role){

document.getElementById("userRole").innerText =
role === "admin" ? "Admin Panel" : "Student Panel";

}

</script>


<!-- ================= MAIN SCRIPT ================= -->

<script src="script.js"></script>

</body>
</html>
